<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://use.fontawesome.com/releases/v5.15.4/js/all.js" defer></script>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

  <div class="settings-btn" id="settingsBtn" title="Налаштування">
    <i class="fas fa-cog"></i>
  </div>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <span data-i18n="settings">Налаштування</span>
      <button class="settings-close" id="settingsClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="settings-section">
      <div class="settings-label" data-i18n="units">Одиниці температури</div>
      <div class="toggle-group">
        <button class="toggle-btn active" data-unit="C">°C Цельсій</button>
        <button class="toggle-btn" data-unit="F">°F Фаренгейт</button>
        <button class="toggle-btn" data-unit="K">K Кельвін</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-label" data-i18n="language">Мова</div>
      <div class="toggle-group">
        <button class="toggle-btn lang-btn active" data-lang="uk">🇺🇦 Українська</button>
        <button class="toggle-btn lang-btn" data-lang="en">🇬🇧 English</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-label">Швидкість вітру</div>
      <div class="toggle-group">
        <button class="toggle-btn wind-btn active" data-wind="kmh">km/h</button>
        <button class="toggle-btn wind-btn" data-wind="ms">m/s</button>
        <button class="toggle-btn wind-btn" data-wind="mph">mph</button>
      </div>
    </div>
  </div>
  <div class="settings-overlay" id="settingsOverlay"></div>

  <div class="sky-canvas" id="skyCanvas">
    <svg class="sun-rays" id="sunRays" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(70,70)">
        <line x1="0" y1="-62" x2="0" y2="-48" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
        <line x1="0" y1="62" x2="0" y2="48" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
        <line x1="-62" y1="0" x2="-48" y2="0" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
        <line x1="62" y1="0" x2="48" y2="0" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
        <line x1="-44" y1="-44" x2="-34" y2="-34" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
        <line x1="44" y1="-44" x2="34" y2="-34" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
        <line x1="-44" y1="44" x2="-34" y2="34" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
        <line x1="44" y1="44" x2="34" y2="34" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
      </g>
    </svg>
    <div class="sun" id="sun"></div>
    <div class="moon" id="moon"></div>
    <div class="stars" id="stars"></div>
    <svg class="cloud cloud-1" id="cloud1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 90" width="200" height="90">
      <ellipse cx="100" cy="60" rx="80" ry="30" fill="white"/>
      <ellipse cx="70" cy="48" rx="38" ry="28" fill="white"/>
      <ellipse cx="120" cy="42" rx="42" ry="32" fill="white"/>
      <ellipse cx="155" cy="55" rx="30" ry="22" fill="white"/>
      <ellipse cx="45" cy="58" rx="28" ry="18" fill="white"/>
    </svg>
    <svg class="cloud cloud-2" id="cloud2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 70" width="160" height="70">
      <ellipse cx="80" cy="48" rx="65" ry="22" fill="white"/>
      <ellipse cx="55" cy="38" rx="32" ry="24" fill="white"/>
      <ellipse cx="100" cy="34" rx="36" ry="27" fill="white"/>
      <ellipse cx="130" cy="44" rx="26" ry="18" fill="white"/>
    </svg>
    <svg class="cloud cloud-3" id="cloud3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 100" width="240" height="100">
      <ellipse cx="120" cy="68" rx="100" ry="32" fill="white"/>
      <ellipse cx="80" cy="52" rx="46" ry="36" fill="white"/>
      <ellipse cx="140" cy="45" rx="52" ry="38" fill="white"/>
      <ellipse cx="190" cy="60" rx="38" ry="26" fill="white"/>
      <ellipse cx="50" cy="64" rx="34" ry="22" fill="white"/>
    </svg>
    <svg class="cloud cloud-4" id="cloud4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 55" width="120" height="55">
      <ellipse cx="60" cy="38" rx="50" ry="17" fill="white"/>
      <ellipse cx="42" cy="30" rx="24" ry="19" fill="white"/>
      <ellipse cx="78" cy="27" rx="28" ry="21" fill="white"/>
    </svg>
    <svg class="cloud cloud-5" id="cloud5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 80" width="180" height="80">
      <ellipse cx="90" cy="55" rx="74" ry="25" fill="white"/>
      <ellipse cx="62" cy="42" rx="36" ry="28" fill="white"/>
      <ellipse cx="118" cy="38" rx="40" ry="30" fill="white"/>
      <ellipse cx="152" cy="50" rx="28" ry="20" fill="white"/>
    </svg>
    <div class="lightning-container" id="lightningContainer"></div>
  </div>

  <div class="app">
    <h1><i class="fas fa-cloud-sun"></i> <span data-i18n="appTitle">Weather App</span></h1>

    <div class="search">
      <input id="cityInput" placeholder="Введіть місто...">
      <button id="searchBtn"><i class="fas fa-search"></i></button>
    </div>
    <div id="suggestions" class="suggestions"></div>

    <div class="quick">
      <button onclick="getWeather('Kyiv')"><i class="fas fa-map-marker-alt"></i> Київ</button>
      <button onclick="getWeather('Lviv')"><i class="fas fa-mountain"></i> Львів</button>
      <button onclick="getWeather('Odesa')"><i class="fas fa-water"></i> Одеса</button>
      <button onclick="getWeather('Kharkiv')"><i class="fas fa-city"></i> Харків</button>
      <button onclick="getWeather('Dnipro')"><i class="fas fa-map-pin"></i> Дніпро</button>
      <button onclick="getWeather('Zaporizhzhia')"><i class="fas fa-map-pin"></i> Запоріжжя</button>
    </div>

    <div class="card main-card" id="mainCard">
      <div class="card-top">
        <div>
          <div class="city-name" id="city">---</div>
          <div class="city-date" id="cityDate">---</div>
        </div>
        <div class="weather-badge" id="desc">---</div>
      </div>

      <div class="card-main">
        <div class="weather-icon-wrap" id="weatherIcon">
  <i class="fas fa-cloud fa-2x"></i>
</div>
        <div class="temp-block">
          <div class="temp-big"><span id="tempVal">--</span><span class="temp-unit" id="tempUnit">°C</span></div>
          <div class="desc-text" id="descSub">Завантаження...</div>
        </div>
      </div>

      <div class="card-stats">
        <div class="stat">
          <i class="fas fa-wind stat-icon"></i>
          <div class="stat-val"><span id="wind">--</span> <span id="windUnit" class="stat-unit">km/h</span></div>
          <div class="stat-label" data-i18n="wind">Вітер</div>
        </div>
        <div class="stat">
          <i class="fas fa-thermometer-half stat-icon"></i>
          <div class="stat-val"><span id="feelsLike">--</span><span id="feelsUnit">°C</span></div>
          <div class="stat-label" data-i18n="feelsLike">Відчувається</div>
        </div>
        <div class="stat">
          <i class="fas fa-tint stat-icon"></i>
          <div class="stat-val"><span id="humidity">--</span>%</div>
          <div class="stat-label" data-i18n="humidity">Вологість</div>
        </div>
        <div class="stat">
          <i class="fas fa-eye stat-icon"></i>
          <div class="stat-val"><span id="uvIndex">--</span></div>
          <div class="stat-label" data-i18n="uv">УФ індекс</div>
        </div>
      </div>

      <div class="sun-times">
        <div class="sun-time-item">
          <i class="fas fa-sun sun-rise-icon"></i>
          <div>
            <div class="sun-time-label" data-i18n="sunrise">Схід сонця</div>
            <div class="sun-time-val" id="sunriseTime">--:--</div>
          </div>
        </div>
        <div class="sun-time-arc">
          <div class="arc-track">
            <div class="arc-fill" id="arcFill"></div>
            <div class="arc-dot" id="arcDot"></div>
          </div>
        </div>
        <div class="sun-time-item">
          <i class="fas fa-moon sun-set-icon"></i>
          <div>
            <div class="sun-time-label" data-i18n="sunset">Захід сонця</div>
            <div class="sun-time-val" id="sunsetTime">--:--</div>
          </div>
        </div>
      </div>
    </div>

    <div class="section-title" data-i18n="todayDetail">Детальний прогноз на сьогодні</div>
    <div class="card hourly-card" id="hourlyCard">
      <div class="hourly-scroll" id="hourlyScroll">
        <div class="hourly-loading"><i class="fas fa-spinner fa-spin"></i></div>
      </div>
    </div>

    <div class="section-title" data-i18n="week7">Прогноз на 7 днів</div>
    <div class="card forecast-card" id="forecastCard">
      <div class="forecast-grid" id="forecastGrid">
        <div class="forecast-loading"><i class="fas fa-spinner fa-spin"></i></div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
